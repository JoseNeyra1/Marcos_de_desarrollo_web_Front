<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud Plus - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card">
                    <div class="login-header">
                        <h2><i class="bi bi-heart-pulse-fill"></i> Salud Plus</h2>
                        <p class="mb-0">Donde la salud es primero</p>
                    </div>
                    <div class="card-body p-4">
                        <div id="alertMessage" class="alert d-none" role="alert"></div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label text-muted fw-bold">Usuario (DNI)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i
                                            class="bi bi-person text-muted"></i></span>
                                    <input type="text" class="form-control" id="username" placeholder="Ingresa tu DNI"
                                        required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label text-muted fw-bold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" class="form-control" id="password"
                                        placeholder="Ingresa tu contraseña" required>
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-medical" id="btnSubmit">
                                    Ingresar <i class="bi bi-box-arrow-in-right"></i>
                                </button>
                                <div class="text-center mt-3">
                                    <a href="#" class="text-success text-decoration-none" data-bs-toggle="modal"
                                        data-bs-target="#modalRecuperar">
                                        <small>¿Olvidaste tu contraseña?</small>
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalRecuperar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="bi bi-key"></i> Restablecer Contraseña</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="text-muted small mb-4">Ingresa tu número de documento (DNI) y la nueva contraseña que deseas utilizar para acceder al sistema.</p>
                    <form id="formRecuperar">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Número de Documento (DNI)</label>
                            <input type="text" class="form-control" id="recUsername" placeholder="Ej: 73178438" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Nueva Contraseña</label>
                            <input type="password" class="form-control" id="recNuevaPassword" placeholder="Escribe tu nueva clave" required>
                        </div>
                        <button type="button" class="btn btn-success w-100 fw-bold" id="btnRestablecer" onclick="cambiarPassword()">
                            Actualizar Contraseña
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="js/login.js"></script>
</body>
</html>
