<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud Plus - Panel Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
        .navbar-doctor { background: linear-gradient(135deg, #2e8b57, #3cb371); }
        .doctor-card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-doctor p-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-stethoscope"></i> Salud Plus | Portal Médico</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="navUsername">Cargando...</span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card doctor-card p-4 text-center bg-white">
                    <div class="my-3">
                        <i class="bi bi-person-badge text-success" style="font-size: 4rem;"></i>
                    </div>
                    <h3 class="h4 fw-bold text-dark" id="doctorNombre">Dr. Cargando...</h3>
                    <p class="text-muted mb-3" id="doctorEspecialidad">Especialista</p>
                    <span class="badge bg-success px-3 py-2 fs-6">Personal Activo</span>
                    <hr class="my-4">
                    <div class="text-start">
                        <p class="text-muted mb-1"><i class="bi bi-calendar-check"></i> Estado de Agenda:</p>
                        <p class="fw-bold text-dark">Consultas Programadas</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card doctor-card p-4 bg-white">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h3 class="mb-0 fw-bold">Agenda de Atenciones</h3>
                            <small class="text-muted">Lista de pacientes asignados para hoy</small>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Hora</th>
                                    <th>Paciente</th>
                                    <th>Motivo de Consulta</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tablaAgendaBody">
                                <tr>
                                    <td colspan="5" class="text-center p-4">
                                        <div class="spinner-border text-success" role="status"></div>
                                        <p class="mt-2 mb-0">Cargando agenda médica...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/medico.js"></script>
</body>
</html>
