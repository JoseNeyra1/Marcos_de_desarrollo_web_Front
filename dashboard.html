<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud Plus - Mis Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <nav class="navbar navbar-dark navbar-app navbar-patient p-3">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-heart-pulse-fill"></i> Clínica Regional Virgen del Rosario</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="navUsername">Cargando...</span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card card-profile">
                    <div class="profile-header">
                        <i class="bi bi-person-circle profile-icon"></i>
                        <h4 class="mt-2" id="perfilNombre">Cargando...</h4>
                        <span class="badge bg-light text-dark">Paciente</span>
                    </div>
                    <div class="card-body">
                        <p class="text-muted mb-1"><i class="bi bi-person-vcard"></i> DNI:</p>
                        <p class="fw-bold" id="perfilDni">-</p>
                        
                        <p class="text-muted mb-1"><i class="bi bi-envelope"></i> Correo:</p>
                        <p class="fw-bold">hola@gmail.com</p>

                        <p class="text-muted mb-1"><i class="bi bi-telephone"></i> Teléfono:</p>
                        <p class="fw-bold">98123789</p>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card card-profile p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h3 class="mb-0">Mis Citas</h3>
                            <small class="text-muted">Gestiona tus citas médicas</small>
                        </div>
                        <button class="btn btn-app-primary" id="btnAbrirModal"><i class="bi bi-plus-lg"></i> Agendar Nueva Cita</button>
                    </div>

                    <div id="contenedorCitas">
                        <div class="text-center p-5 text-muted">
                            <div class="spinner-border text-info" role="status"></div>
                            <p class="mt-2">Cargando tus citas...</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAgendar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: var(--radius-lg); overflow: hidden; border: none;">
                <div class="modal-header text-white" style="background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark)); border: none;">
                    <h5 class="modal-title"><i class="bi bi-calendar-plus"></i> Nueva Cita Médica</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formAgendar">
                        <div class="mb-3">
                            <label class="form-label">Especialidad</label>
                            <select class="form-select" id="selectEspecialidad" required>
                                <option value="">Seleccione una especialidad...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Médico</label>
                            <select class="form-select" id="selectMedico" required disabled>
                                <option value="">Primero elija una especialidad...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha y Hora</label>
                            <input type="datetime-local" class="form-control" id="fechaHora" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Motivo de consulta</label>
                            <textarea class="form-control" id="motivo" rows="2" placeholder="Describa brevemente sus síntomas..." required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-app-primary" id="btnGuardarCita" onclick="guardarCita()">Confirmar Cita</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
